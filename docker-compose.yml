      redis:
        condition: service_healthy
    networks:
      - dapr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  payment-service-dapr:
    image: daprio/daprd:1.14.4
    command:
      - "./daprd"
      - "-app-id"
      - "payment-service"
      - "-app-port"
      - "5003"
      - "-dapr-http-port"
      - "3503"
      - "-dapr-grpc-port"
      - "50003"
      - "-placement-host-address"
      - "dapr-placement:50006"
      - "-components-path"
      - "/components"
      - "-config"
      - "/components/zipkin.yaml"
    volumes:
