apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: order-webhook
spec:
  type: bindings.http
  version: v1
  metadata:
    # Webhook target — replace with real URL in production.
    # In local dev this points to a mock echo endpoint (httpbin).
    - name: url
      value: "https://httpbin.org/post"
scopes:
  - order-service

